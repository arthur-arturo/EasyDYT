<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyDYT - Configuración</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-card">
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" class="logo-icon">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6zm-2 16c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
          <path d="M16 15l-3 3-3-3h2v-4h2v4h2z"/>
        </svg>
        <h1>EasyDYT</h1>
      </div>
      <div class="status">
        <span class="pulse-dot"></span>
        <span class="status-text">Listo</span>
      </div>
    </header>

    <main class="content">
      <div class="input-group">
        <label for="server-input">Servidor de Descargas (Cobalt):</label>
        <div class="input-wrapper">
          <input type="text" id="server-input" placeholder="https://api.cobalt.tools" spellcheck="false" />
          <button id="save-btn" class="btn-primary">Guardar</button>
        </div>
        <p class="help-text">Si las descargas fallan, puedes cambiar a uno de los servidores comunitarios probados abajo.</p>
      </div>

      <div class="presets-section">
        <h3>Servidores Comunitarios Activos:</h3>
        <div class="preset-buttons">
          <button class="preset-btn active" data-url="https://cobaltapi.kittycat.boo">Cobalt Kittycat (Por Defecto)</button>
          <button class="preset-btn" data-url="https://fox.kittycat.boo">Fox Kittycat</button>
          <button class="preset-btn" data-url="https://api.cobalt.liubquanti.click">Liubquanti Click</button>
          <button class="preset-btn" data-url="https://api.cobalt.blackcat.sweeux.org">Sweeux Blackcat</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>EasyDYT &copy; 2026</p>
      <a href="https://cobalt.directory/" target="_blank" class="directory-link">Ver lista completa de servidores &nearr;</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
